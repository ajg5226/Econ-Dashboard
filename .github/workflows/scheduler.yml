name: Weekly Data Refresh

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3 AM UTC
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update job (6M primary)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m scheduler.update_job

      - name: Run update job (18M secondary horizon)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m scheduler.update_job --horizon 18 --variant-output-dir data/models/horizon_18m/

      - name: Append 18M secondary signal to executive report
        run: python scripts/append_18m_secondary_signal.py

      - name: Commit and push data (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly data refresh $(date +'%Y-%m-%d')"
          git push
